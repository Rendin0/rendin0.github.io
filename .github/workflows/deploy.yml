name: Deploy Hugo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Decrypt posts
        run: |
          mkdir -p content
          openssl enc -d -aes-256-cbc -pbkdf2 -pass pass:"$MASTER_KEY" \
            -in posts.tar.enc | tar xzf - -C content
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }}

      - run: hugo --minify

      - name: Encrypt locked fragments
        run: |
          openssl enc -d -aes-256-cbc -pbkdf2 \
            -in secrets.json.enc -out /tmp/secrets.json -pass pass:"$MASTER_KEY"
          npm install cheerio --no-save
          node scripts/encrypt-fragments.mjs
          rm -f /tmp/secrets.json
          rm -rf content/posts
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }}

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public